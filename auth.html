<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura TV | Ro'yxatdan o'tish</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00D2FF;
            --bg: #000;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            text-align: center;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .logo span {
            color: var(--primary);
        }

        h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 40px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 8px;
            padding-left: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 18px;
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.15);
        }

        .btn-auth {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), #925FFF);
            border: none;
            border-radius: 18px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.25);
        }

        .btn-auth:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 210, 255, 0.4);
        }

        #sms-step {
            display: none;
        }

        .otp-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 30px;
        }

        .otp-input {
            width: 55px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--primary);
        }

        .resend-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="logo">AURA<span>TV</span></div>

        <!-- Step 1: Phone -->
        <div id="phone-step">
            <h2>Xush kelibsiz!</h2>
            <p>Iltimos, telefon raqamingizni kiriting</p>

            <div class="input-group">
                <label>Telefon raqam</label>
                <input type="tel" id="phone-number" placeholder="+998 90 123-45-67" value="+998 ">
            </div>

            <div style="display: flex; align-items: flex-start; gap: 10px; margin-bottom: 30px; text-align: left;">
                <input type="checkbox" id="agree-check"
                    style="width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary);">
                <label for="agree-check" style="font-size: 13px; color: rgba(255,255,255,0.6); cursor: pointer;">
                    Men <a href="offera.html" target="_blank"
                        style="color: var(--primary); text-decoration: none; font-weight: 600;">Ommaviy Oferta</a>
                    shartlariga roziman
                </label>
            </div>

            <button class="btn-auth" id="send-btn" onclick="sendSMS()" disabled
                style="opacity: 0.5; filter: grayscale(1); cursor: not-allowed;">Kodni yuborish</button>
        </div>

        <!-- Step 2: SMS OTP -->
        <div id="sms-step">
            <h2>Kodni tasdiqlang</h2>
            <p id="sent-to-text">Kod yuborildi: +998 90 123 45 67</p>

            <div class="otp-group">
                <input type="text" maxlength="1" class="otp-input" onkeyup="moveNext(this, event)">
                <input type="text" maxlength="1" class="otp-input" onkeyup="moveNext(this, event)">
                <input type="text" maxlength="1" class="otp-input" onkeyup="moveNext(this, event)">
                <input type="text" maxlength="1" class="otp-input" onkeyup="moveNext(this, event)">
            </div>

            <button class="btn-auth" onclick="verifyOTP()">Tasdiqlash</button>
            <div class="resend-text">Kodni qayta yuborish (59s)</div>
        </div>
    </div>

    <script>
        // Telefon raqamni chiroyli maskalash (+998 90 123 45 67)
        const phoneInput = document.getElementById('phone-number');
        phoneInput.oninput = function (e) {
            let input = e.target.value.replace(/\D/g, '');
            if (input.startsWith('998')) input = input.substring(3);

            let res = '+998 ';
            if (input.length > 0) res += input.substring(0, 2);
            if (input.length > 2) res += ' ' + input.substring(2, 5);
            if (input.length > 5) res += ' ' + input.substring(5, 7);
            if (input.length > 7) res += ' ' + input.substring(7, 9);

            e.target.value = res.trim();
        };

        // Checkbox validation
        document.getElementById('agree-check').onchange = function () {
            const btn = document.getElementById('send-btn');
            if (this.checked) {
                btn.disabled = false;
                btn.style.opacity = "1";
                btn.style.filter = "none";
                btn.style.cursor = "pointer";
            } else {
                btn.disabled = true;
                btn.style.opacity = "0.5";
                btn.style.filter = "grayscale(1)";
                btn.style.cursor = "not-allowed";
            }
        };

        function sendSMS() {
            const phone = document.getElementById('phone-number').value;
            if (phone.length < 12) {
                alert("Iltimos, to'liq raqamni kiriting!");
                return;
            }

            document.getElementById('phone-step').style.display = 'none';
            document.getElementById('sms-step').style.display = 'block';
            document.getElementById('sent-to-text').innerText = "Kod yuborildi: " + phone;
        }

        function verifyOTP() {
            alert("Muvaffaqiyatli ro'yxatdan o'tdingiz!");
            window.location.href = "index.html";
        }

        function moveNext(input, e) {
            if (input.value.length >= 1 && input.nextElementSibling) {
                input.nextElementSibling.focus();
            }
            // Backspace logic
            if (e && e.key === "Backspace" && input.previousElementSibling && input.value.length === 0) {
                input.previousElementSibling.focus();
            }
        }
    </script>
</body>

</html>
